<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>rss4u Legal Information</title>
    <link rel="icon" type="image/svg+xml" href="./assets/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./assets/icon-16.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link

      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <link id="theme-stylesheet" rel="stylesheet" href="./themes/light/theme.css" />

  <body data-theme="light">
    <div class="bg-glow bg-glow-a" aria-hidden="true"></div>

          <a id="link-mit-reference" href="https://opensource.org/licenses/MIT" target="_blank" rel="noopener noreferrer">MIT reference</a>
          <span class="footer-divider" aria-hidden="true">|</span>
          <a id="link-back" href="./index.html">Back to rss4u</a>

    </main>
    <script type="module" src="./js/legal.js"></script>
