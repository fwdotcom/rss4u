<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>rss4u</title>
    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="./icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./icon-16.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <link id="theme-stylesheet" rel="stylesheet" href="./themes/light/theme.css" />
  </head>
  <body>
    <div class="bg-glow bg-glow-a" aria-hidden="true"></div>
    <div class="bg-glow bg-glow-b" aria-hidden="true"></div>

    <main class="app">
      <header class="hero">
        <div class="hero-top-row">
          <h1 class="hero-title">
            <img
              class="hero-icon"
              alt="RSS"
              src="./icon.svg"
            />
            <span id="app-title-text">rss4u</span>
          </h1>
          <div class="header-pickers">
            <div class="theme-picker">
              <label id="theme-label" for="theme-select" class="theme-label">Theme</label>
              <select id="theme-select" name="theme-select" aria-label="Select theme">
                <option value="light">Light</option>
                <option value="dark">Dark</option>
              </select>
            </div>
            <div class="theme-picker">
              <label id="language-label" for="language-select" class="theme-label">Language</label>
              <select id="language-select" name="language-select" aria-label="Select language">
                <option value="en">English</option>
                <option value="de">Deutsch</option>
                <option value="fr">Francais</option>
                <option value="es">Espanol</option>
                <option value="it">Italiano</option>
                <option value="pl">Polski</option>
                <option value="cs">Cestina</option>
                <option value="nl">Nederlands</option>
              </select>
            </div>
          </div>
        </div>
        <p id="app-subtitle" class="subtitle">
          Read any RSS feed right in your browser. Paste URL, load, done.
        </p>
      </header>

      <section id="controls-section" class="controls" aria-label="Feed controls">
        <form id="feed-form" class="feed-form">
          <label id="feed-url-label" for="feed-url">Feed URL</label>
          <div class="input-row main-input-row">
            <input
              id="feed-url"
              name="feed-url"
              type="url"
              placeholder="https://example.com/feed.xml"
              required
            />
            <button id="load-btn" type="submit">Load</button>
            <button id="favorite-btn" type="button" aria-label="Save as favorite" title="Save as favorite">
              <img
                id="favorite-icon"
                alt="Favorit"
                src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' width='24' height='24'%3E%3Cpath d='M12 3.7l2.6 5.2 5.7.8-4.1 4 1 5.7-5.2-2.7-5.2 2.7 1-5.7-4.1-4 5.7-.8z' fill='none' stroke='%23ffffff' stroke-width='1.8' stroke-linejoin='round'/%3E%3C/svg%3E"
              />
            </button>
            <div class="quick-feeds-toolbar" aria-label="Favorites actions">
              <button id="import-favorites-btn" class="feed-toolbar-btn" type="button" aria-label="Import favorites from JSON">
                <img
                  class="feed-toolbar-icon"
                  alt=""
                  aria-hidden="true"
                  src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' width='24' height='24'%3E%3Cpath d='M12 20v-9' stroke='%23ffffff' stroke-width='2' stroke-linecap='round'/%3E%3Cpath d='M8.5 13.5L12 10l3.5 3.5' fill='none' stroke='%23ffffff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M5 6h14' stroke='%23ffffff' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E"
                />
              </button>
              <button id="export-favorites-btn" class="feed-toolbar-btn" type="button" aria-label="Export favorites as JSON">
                <img
                  class="feed-toolbar-icon"
                  alt=""
                  aria-hidden="true"
                  src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' width='24' height='24'%3E%3Cpath d='M12 4v9' stroke='%23ffffff' stroke-width='2' stroke-linecap='round'/%3E%3Cpath d='M8.5 10.5L12 14l3.5-3.5' fill='none' stroke='%23ffffff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M5 18h14' stroke='%23ffffff' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E"
                />
              </button>
              <input
                id="favorites-file-input"
                type="file"
                accept="application/json,.json"
                class="visually-hidden"
                aria-hidden="true"
                tabindex="-1"
              />
            </div>
          </div>
        </form>

        <div id="quick-feeds" class="quick-feeds" aria-label="Quick selection and saved feeds"></div>

        <p id="status" class="status" role="status" aria-live="polite"></p>
      </section>

      <section id="results-section" class="results" aria-label="Feed content">
        <div id="feed-meta" class="feed-meta"></div>
        <ul id="items" class="items"></ul>
      </section>

      <footer id="site-footer" class="site-footer" aria-label="Footer links">
        <p>
          Copyright (C) <span id="copyright-year"></span>
          <a class="author-link" href="https://www.frankwinter.com" target="_blank" rel="noopener noreferrer">Frank Winter</a>
        </p>
        <div class="footer-links" aria-label="Footer links">
          <a id="footer-website-link" href="https://github.com/fwdotcom/rss4u" target="_blank" rel="noopener noreferrer">Website</a>
          <span class="footer-divider" aria-hidden="true">|</span>
          <a id="footer-license-link" href="./legal.html" target="_blank" rel="noopener noreferrer">License</a>
          <span class="footer-divider" aria-hidden="true">|</span>
          <button id="reset-app-btn" class="footer-action-btn" type="button" aria-label="Reset to defaults">
            Reset to defaults
          </button>
        </div>
      </footer>
    </main>

    <script type="module" src="./script.js"></script>
  </body>
</html>
