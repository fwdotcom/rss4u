<!--
Template contract for tile rendering (dark theme).

This file is loaded dynamically by script.js and then receives token replacements.
Every token is optional at runtime, but the following placeholders are supported:

- #theme#:
  The current theme key (for example: "light" or "dark").

- #image#:
  Full <img> markup or an empty string when the feed item has no media.

- #headline#:
  Escaped article title text.

- #description#:
  Escaped preview text, pre-truncated in script.js.

- #date#:
  Localized publication date text (or fallback text like "Kein Datum").

- #link#:
  Escaped destination URL for the article link.

Important:
- Keep the "tile-*" class names if you want existing theme.css files to keep working.
- Avoid inline scripts/events; templates are meant for presentation markup only.
-->
<article class="tile tile-dark" data-theme="#theme#">
  #image#
  <div class="tile-content">
    <span class="tile-date">#date#</span>
    <h3 class="tile-headline">#headline#</h3>
    <p class="tile-description">#description#</p>
    <div class="tile-meta">
      <a class="tile-link" href="#link#" target="_blank" rel="noopener noreferrer">Read</a>
    </div>
  </div>
</article>
