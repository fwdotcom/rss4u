<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>rss4u License Info</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: linear-gradient(140deg, #f8f7f4, #efeee8);
        --panel: rgba(255, 255, 255, 0.86);
        --line: #ccd2d8;
        --text: #20252c;
        --muted: #5d6873;
        --accent: #d15731;
        --shadow: rgba(20, 28, 33, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 22px;
        color: var(--text);
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        background: var(--bg);
      }

      .wrap {
        max-width: 860px;
        margin: 0 auto;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: var(--panel);
        box-shadow: 0 14px 30px var(--shadow);
        padding: 22px;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.5rem, 2.8vw, 2.1rem);
      }

      p {
        margin: 12px 0 0;
        color: var(--muted);
      }

      .links {
        margin-top: 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      a {
        color: var(--accent);
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main class="wrap" aria-label="License information">
      <h1>MIT License</h1>
      <p>
        The authoritative license text for this project is stored in the
        <code>LICENSE</code> file.
      </p>
      <div class="links">
        <a href="./LICENSE" target="_blank" rel="noopener noreferrer">Open LICENSE file</a>
        <a href="https://opensource.org/licenses/MIT" target="_blank" rel="noopener noreferrer">MIT license reference</a>
        <a href="./index.html">Back to rss4u</a>
      </div>
    </main>
  </body>
</html>
